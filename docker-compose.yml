version: '3.8'

services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app:delegated
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend